version: '3'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vlx_user
      POSTGRES_PASSWORD: vlx_password
      POSTGRES_DB: vlx_flow_prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://vlx_user:vlx_password@postgres:5432/vlx_flow_prod
    depends_on:
      - postgres
    restart: always

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "80:5173"
    environment:
      VITE_API_URL: http://localhost:3000
    restart: always

volumes:
  postgres_prod_data:
